<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Console Snippets — kumozoe tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0e14;
    --bg-panel:#0f1520;
    --border-glass:rgba(94,234,212,0.14);
    --border-glass-strong:rgba(94,234,212,0.32);
    --accent:#5eead4;
    --accent-dim:#2dd4bf;
    --accent-glow:rgba(94,234,212,0.25);
    --text-primary:#e6edf3;
    --text-muted:#8b98a5;
    --text-faint:#5a6472;
    --amber:#f5c26b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(94,234,212,0.06), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(94,234,212,0.04), transparent 55%),
      var(--bg-deep);
    color:var(--text-primary);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  .topbar{
    position:sticky; top:0; z-index:20;
    background:rgba(10,14,20,0.9);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border-glass);
    padding:16px 24px;
    display:flex; align-items:center; gap:20px; flex-wrap:wrap;
  }
  .brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700; font-size:18px; letter-spacing:-0.02em;
    display:flex; align-items:center; gap:8px; white-space:nowrap;
  }
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent-glow);}
  .brand .path{color:var(--text-muted); font-family:'JetBrains Mono',monospace; font-weight:400; font-size:14px;}

  .searchwrap{flex:1; min-width:200px; max-width:480px; position:relative;}
  .searchwrap::before{
    content:'>'; position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color:var(--accent); font-family:'JetBrains Mono',monospace; font-weight:600; pointer-events:none;
  }
  #search{
    width:100%; padding:10px 14px 10px 32px;
    background:var(--bg-panel); border:1px solid var(--border-glass);
    border-radius:8px; color:var(--text-primary);
    font-family:'JetBrains Mono',monospace; font-size:14px;
    outline:none; transition:border-color .15s, box-shadow .15s;
  }
  #search::placeholder{color:var(--text-faint);}
  #search:focus{border-color:var(--border-glass-strong); box-shadow:0 0 0 3px var(--accent-glow);}

  .count-badge{
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-muted);
    padding:6px 10px; border:1px solid var(--border-glass); border-radius:6px; white-space:nowrap;
  }

  main{max-width:880px; margin:0 auto; padding:28px 20px 80px;}

  .hint{
    display:flex; gap:18px; flex-wrap:wrap;
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-muted);
    border:1px solid var(--border-glass); background:var(--bg-panel);
    border-radius:8px; padding:12px 16px; margin-bottom:22px; line-height:1.7;
  }
  .hint b{color:var(--accent-dim); font-weight:600;}

  .list{display:flex; flex-direction:column; gap:10px;}
  .empty{display:none; text-align:center; padding:80px 20px; color:var(--text-faint); font-family:'JetBrains Mono',monospace;}

  .row{
    display:flex; align-items:center; gap:14px;
    background:var(--bg-panel);
    border:1px solid var(--border-glass);
    border-radius:10px;
    padding:14px 16px;
    transition:border-color .15s, box-shadow .15s;
  }
  .row:hover{border-color:var(--border-glass-strong); box-shadow:0 8px 24px -14px rgba(94,234,212,0.2);}

  .row .dots{display:flex; gap:5px; flex-shrink:0;}
  .row .dots i{width:7px;height:7px;border-radius:50%; display:block; background:#5eead444; border:1px solid #5eead477;}

  .row-main{flex:1; min-width:0;}
  .row-title{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; color:var(--text-primary); margin:0 0 3px;}
  .row-desc{font-size:12.5px; color:var(--text-muted); margin:0; line-height:1.5;}

  .actions{display:flex; gap:8px; flex-shrink:0;}
  .btn{
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:500;
    padding:8px 12px; border-radius:7px; border:1px solid var(--border-glass);
    background:rgba(255,255,255,0.02); color:var(--text-muted);
    cursor:pointer; text-decoration:none; white-space:nowrap;
    display:inline-flex; align-items:center; gap:6px;
    transition:all .12s;
  }
  .btn:hover{border-color:var(--border-glass-strong); color:var(--accent); background:rgba(94,234,212,0.06);}
  .btn.copy.copied{color:var(--accent); border-color:var(--border-glass-strong);}
  .btn.bm{color:var(--amber);}
  .btn.bm:hover{border-color:#f5c26b66; color:var(--amber); background:rgba(245,194,107,0.08);}
  .btn.unlock{color:#f5c26b;border-color:#f5c26b55}.lock-note{color:var(--amber);font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:5px}
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}.modal-backdrop.show{display:flex}.modal{width:min(390px,100%);background:#0f1520;border:1px solid var(--border-glass-strong);border-radius:14px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.55)}.modal h2{font-family:'Space Grotesk',sans-serif;margin:0 0 8px;font-size:19px}.modal p{color:var(--text-muted);font-size:13px;line-height:1.6;margin:0 0 16px}.modal input{width:100%;padding:11px 12px;background:#0a0e14;border:1px solid var(--border-glass);border-radius:8px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;outline:none}.modal input:focus{border-color:var(--accent)}.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:15px}.modal-error{min-height:18px;color:#fb7185;font-size:12px;margin-top:8px}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#0f1520; border:1px solid var(--border-glass-strong); color:var(--text-primary);
    font-family:'JetBrains Mono',monospace; font-size:13px;
    padding:12px 18px; border-radius:8px; opacity:0; pointer-events:none;
    transition:opacity .2s, transform .2s; z-index:50; max-width:90vw; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  footer{
    text-align:center; padding:30px 20px 50px;
    color:var(--text-faint); font-family:'JetBrains Mono',monospace; font-size:12px;
  }
  footer a{color:var(--accent-dim); text-decoration:none;}

  @media(max-width:640px){
    .row{flex-wrap:wrap;}
    .actions{width:100%; justify-content:flex-end;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span>console.snippets <span class="path">/ tools.kumozoe.com</span></div>
  <div class="searchwrap"><input id="search" type="text" placeholder="搜尋標題或說明..."></div>
  <div class="count-badge" id="countBadge">0 個片段</div>
</div>

<main>
  <div class="hint">
    <span><b>📋 複製</b> — 複製程式碼，貼到 Chrome DevTools Console 執行</span>
    <span><b>🔖 書籤</b> — 用滑鼠把按鈕拖曳到瀏覽器書籤列，之後點書籤即可直接執行</span>
  </div>

  <div class="list" id="list"></div>
  <div class="empty" id="emptyState">// 找不到符合的片段</div>
</main>

<footer>手動整理的 Chrome DevTools Console 常用片段 · <a href="https://tools.kumozoe.com">tools.kumozoe.com</a></footer>

<div class="modal-backdrop" id="unlockModal"><div class="modal" role="dialog" aria-modal="true"><h2>🔒 解鎖程式碼</h2><p>輸入密碼後，本次分頁中的所有鎖定程式碼都會解鎖。關閉分頁後會自動上鎖。</p><input id="unlockPassword" type="password" autocomplete="current-password" placeholder="輸入密碼"><div class="modal-error" id="unlockError"></div><div class="modal-actions"><button class="btn" id="unlockCancel">取消</button><button class="btn unlock" id="unlockSubmit">解鎖</button></div></div></div><div class="toast" id="toast"></div>

<script>
/* =========================================================
   資料區：所有片段都放在這個陣列。
   要新增片段：加一個物件，格式如下
   { id, title, desc, code }
   code 可以是一般 (function(){...})() 寫法，
   也可以是已經帶 javascript: 前綴的書籤小工具寫法，兩種都支援。
   ========================================================= */
const SNIPPETS = [
  {
    "id": "taipei-elearn-autoplay",
    "title": "台北e大上課",
    "desc": "面板化操作：掃描課表、開課、點擊進入教材，含暫停/跳過/停止與自訂時間功能。",
    "code": "/**\n * 台北E大 自動上課腳本 v2.2.9 (修正版)\n * ─────────────────────────────────────────────────────\n * 修正更新：\n * ① 修正認證時數換算邏輯（1小時認證僅需修30分鐘，以此類推打五折）。\n * ② 修正卡在第二層問題：將點擊器改為「常駐穿透模式」，支援多層級連點。\n * ③ 🚀 修正「重複開啟」錯誤：加入標記機制（點過的元素不重覆點）與終點偵測（進入教材即停止點擊）。\n * ④ ⏱ 補償機制：預設所有課程（包含自訂時間）皆自動增加 3 分鐘觀看時間，避免系統少算。\n */\n(function () {\n  'use strict';\n\n  if (document.getElementById('__taipei_elearn_bot__')) {\n    alert('腳本已執行，請勿重複載入！'); return;\n  }\n\n  const POPUP_OPTS = 'width=1024,height=768,toolbar=0,scrollbars=1,status=0';\n\n  /* ════════════════════════════════\n      狀態\n     ════════════════════════════════ */\n  const state = {\n    courses: [],\n    index: 0,\n    popup: null,\n    timer: null,\n    clickTimer: null,\n    running: false,\n    paused: false,\n    endTime: 0,\n    pauseStart: 0,\n    totalPausedMs: 0,\n  };\n\n  /* ════════════════════════════════\n      面板 HTML\n     ════════════════════════════════ */\n  const panel = document.createElement('div');\n  panel.id = '__taipei_elearn_bot__';\n  panel.innerHTML = `\n  <div style=\"position:fixed;top:20px;right:20px;z-index:2147483647;\n    background:#fff;border:2px solid #1a73e8;border-radius:14px;\n    padding:18px;width:346px;box-shadow:0 6px 24px rgba(0,0,0,.18);\n    font-family:system-ui,Arial,sans-serif;font-size:14px;\">\n\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;\">\n      <span style=\"color:#1a73e8;font-size:16px;font-weight:700;\">🎓 台北E大 自動上課<\/span>\n      <button id=\"__eb_close__\"\n        style=\"border:none;background:none;cursor:pointer;font-size:20px;color:#aaa;line-height:1;\">×<\/button>\n    <\/div>\n\n    <div id=\"__eb_status__\"\n      style=\"background:#f8f9fa;border-radius:8px;padding:10px;margin-bottom:12px;\n        min-height:64px;color:#333;font-size:13px;line-height:1.7;\">\n      請先確認已登入台北E大，<br>再點「🔍 掃描課程」。\n    <\/div>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;\">\n      <button id=\"__eb_scan__\"\n        style=\"padding:9px 6px;background:#1a73e8;color:#fff;border:none;\n          border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;\">\n        🔍 掃描課程<\/button>\n      <button id=\"__eb_start__\"\n        style=\"padding:9px 6px;background:#34a853;color:#fff;border:none;\n          border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;\" disabled>\n        ▶ 開始<\/button>\n    <\/div>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;\">\n      <button id=\"__eb_pause__\"\n        style=\"padding:9px 4px;background:#fbbc04;color:#333;border:none;\n          border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;\" disabled>\n        ⏸ 暫停<\/button>\n      <button id=\"__eb_skip__\"\n        style=\"padding:9px 4px;background:#7c4dff;color:#fff;border:none;\n          border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;\" disabled>\n        ⏭ 跳過<\/button>\n      <button id=\"__eb_stop__\"\n        style=\"padding:9px 4px;background:#ea4335;color:#fff;border:none;\n          border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;\" disabled>\n        ⏹ 停止<\/button>\n    <\/div>\n\n    <div id=\"__eb_list__\"\n      style=\"margin-top:12px;max-height:190px;overflow-y:auto;\n        font-size:12px;border-radius:6px;border:1px solid #e8e8e8;\"><\/div>\n\n    <div style=\"margin-top:10px;padding:10px 12px;background:#f8f9fa;\n      border-radius:8px;font-size:12px;\">\n      <label style=\"display:flex;align-items:center;gap:8px;cursor:pointer;\n        color:#444;font-weight:600;user-select:none;\">\n        <input type=\"checkbox\" id=\"__eb_custom_check__\" style=\"cursor:pointer;width:14px;height:14px;\">\n        指定執行時間（覆蓋課程剩餘時數）\n      <\/label>\n      <div id=\"__eb_custom_row__\"\n        style=\"margin-top:8px;display:none;align-items:center;gap:8px;padding-left:22px;\">\n        <input id=\"__eb_custom_min__\" type=\"number\" value=\"30\" min=\"1\" max=\"600\"\n          style=\"width:64px;text-align:center;border:1px solid #ccc;border-radius:5px;\n            padding:4px 6px;font-size:13px;\">\n        <span style=\"color:#777;\">分鐘<\/span>\n      <\/div>\n    <\/div>\n\n    <div style=\"margin-top:6px;font-size:11px;color:#bbb;text-align:right;\">\n      v2.2.9 · 時間補償版\n    <\/div>\n  <\/div>`;\n  document.body.appendChild(panel);\n\n  /* ════════════════════════════════\n      工具\n     ════════════════════════════════ */\n  const $ = id => document.getElementById(id);\n  const setStatus = (html, color = '#333') => {\n    $('__eb_status__').innerHTML = html;\n    $('__eb_status__').style.color = color;\n  };\n  const log = (...a) => console.log('[台北E大 v2.2.9]', ...a);\n\n  function fmtSec(sec) {\n    sec = Math.max(0, Math.floor(sec));\n    const h = Math.floor(sec / 3600);\n    const m = Math.floor((sec % 3600) / 60);\n    const s = sec % 60;\n    return (h > 0 ? h + '小時' : '') + (m > 0 ? m + '分' : '') + (s > 0 ? s + '秒' : (m === 0 && h === 0 ? '0秒' : ''));\n  }\n\n  function fmtToMinStr(sec) {\n    return Math.ceil(sec / 60) + '分鐘';\n  }\n\n  function parseTimeSec(text) {\n    if (!text) return 0;\n    text = text.trim().replace(/[\\s\\xa0\\xac\\t\\r\\n]+/g, '');\n    if (!text || text === '-' || text === '--') return 0;\n\n    if (/^\\d+(\\.\\d+)?$/.test(text)) {\n      const n = parseFloat(text);\n      return n <= 12 ? Math.ceil(n * 3600) : Math.ceil(n * 60);\n    }\n\n    let m;\n    m = text.match(/^(\\d+):(\\d+):(\\d+)$/);\n    if (m) return +m[1]*3600 + +m[2]*60 + +m[3];\n\n    m = text.match(/^(\\d+):(\\d+)$/);\n    if (m) return +m[1]*3600 + +m[2]*60;\n\n    m = text.match(/(\\d+\\.?\\d*)(?:小時|時)(?:(\\d+)分)?(?:(\\d+)秒)?/);\n    if (m) return Math.ceil(parseFloat(m[1])*3600) + (+(m[2]||0)*60) + +(m[3]||0);\n\n    m = text.match(/^(\\d+)分(?:(\\d+)秒)?$/);\n    if (m) return +m[1]*60 + +(m[2]||0);\n\n    m = text.match(/^(\\d+)秒$/);\n    if (m) return +m[1];\n\n    return 0;\n  }\n\n  /* ════════════════════════════════\n      掃描課程\n     ════════════════════════════════ */\n  function scanCourses() {\n    state.courses = [];\n    const seen = new Set();\n\n    document.querySelectorAll('table').forEach(table => {\n      const headerRow = table.querySelector('thead tr') ||\n                        Array.from(table.querySelectorAll('tr'))\n                          .find(r => r.querySelectorAll('th').length > 0) ||\n                        table.querySelector('tr');\n      \n      let certIdx = -1, studyIdx = -1, statusIdx = -1;\n      if (headerRow) {\n        const headers = Array.from(headerRow.querySelectorAll('th, td'))\n          .map(h => h.innerText.replace(/\\s+/g, ''));\n        headers.forEach((h, i) => {\n          if (/認證.*時|時數/.test(h) && !/修課/.test(h)) certIdx = i;\n          if (/修課時間|修課|上課時間|已學|已修/.test(h))  studyIdx = i;\n          if (/完成與否|狀態|是否完成/.test(h)) statusIdx = i;\n        });\n      }\n\n      const bodyRows = table.querySelectorAll('tbody tr').length\n        ? table.querySelectorAll('tbody tr')\n        : Array.from(table.querySelectorAll('tr')).filter(r => r !== headerRow);\n\n      bodyRows.forEach(row => {\n        let cells = Array.from(row.querySelectorAll('td'));\n        if (cells.length === 0) { cells = Array.from(row.children); }\n        if (cells.length < 1) return;\n\n        const mainLink = Array.from(row.querySelectorAll('a[href]')).find(a => {\n          const h = a.getAttribute('href') || '';\n          return h && h !== '#' && !h.startsWith('javascript');\n        });\n\n        const nodeLinks = Array.from(row.querySelectorAll('a[onclick*=\"openNode\"]'));\n        let nodeSec = 0;\n        nodeLinks.forEach(a => {\n          const t = parseTimeSec((a.textContent || a.innerText || '').trim());\n          if (t > 0) nodeSec += t;\n        });\n\n        const hasDataAttr = row.querySelector('[data-column*=\"認證\"]');\n        if (!mainLink && nodeLinks.length === 0 && certIdx === -1 && !hasDataAttr) return;\n\n        const href = mainLink ? mainLink.href : '#';\n        \n        const nameTd = row.querySelector('[data-column*=\"名稱\"], [data-column*=\"課程\"]');\n        const name = ((mainLink?.innerText || nameTd?.innerText || row.querySelector('.table-row__title')?.innerText || cells[0]?.innerText || '未命名課程')\n          .replace(/\\s+/g, ' ').trim()).substring(0, 40);\n\n        if (href !== '#' && seen.has(href)) return;\n        if (href !== '#') seen.add(href);\n\n        const certTd  = row.querySelector('[data-column*=\"認證\"]');\n        let studyTd = row.querySelector('[data-column*=\"修課\"], [data-column*=\"已修\"], [data-column*=\"已學\"], [data-column*=\"上課時數\"]');\n        \n        if (studyTd === certTd) studyTd = null;\n\n        let certText  = certTd ? certTd.innerText.trim() : '';\n        let studyText = studyTd ? studyTd.innerText.trim() : '';\n\n        let certSec  = parseTimeSec(certText);\n        let studySec = parseTimeSec(studyText);\n\n        if (certSec === 0) {\n          const policyEl = row.querySelector('.table-row__policy, [class*=\"policy\"]');\n          if (policyEl) certSec = parseTimeSec(policyEl.innerText.trim());\n        }\n\n        if (certSec === 0 && certIdx >= 0 && cells[certIdx]) certSec = parseTimeSec(cells[certIdx].innerText);\n        if (studySec === 0 && studyIdx >= 0 && cells[studyIdx]) studySec = parseTimeSec(cells[studyIdx].innerText);\n\n        if (nodeSec > 0) studySec = nodeSec;\n\n        if (certSec === 0) {\n          const rt = row.innerText;\n          const hm = rt.match(/(\\d+\\.?\\d*)\\s*小時/);\n          if (hm) certSec = Math.ceil(parseFloat(hm[1]) * 3600);\n        }\n\n        if (studySec === 0) {\n          const possibleCells = row.querySelectorAll('p, span, td');\n          for (const el of possibleCells) {\n            if (certTd && (el === certTd || certTd.contains(el))) continue;\n            const txt = el.innerText.trim();\n            if (txt.length > 0 && txt.length < 12) {\n              if (/^\\d{1,2}:\\d{2}(:\\d{2})?$/.test(txt) || /(\\d+\\s*分|\\d+\\s*秒)/.test(txt)) {\n                studySec = parseTimeSec(txt);\n                break;\n              }\n            }\n          }\n        }\n\n        const statusTd = row.querySelector('[data-column*=\"完成\"], [data-column*=\"狀態\"]');\n        let isExplicitDone = false;\n        if (statusTd && (statusTd.innerText.includes('已完成') || statusTd.innerText.includes('Keep'))) isExplicitDone = true;\n        \n        if (!isExplicitDone && statusIdx >= 0 && cells[statusIdx]) {\n          if (cells[statusIdx].innerText.includes('已完成')) isExplicitDone = true;\n        }\n        if (!isExplicitDone) {\n          for (const cell of cells) {\n            if (cell.innerText.includes('已完成')) {\n              isExplicitDone = true;\n              break;\n            }\n          }\n        }\n\n        // 時數減半邏輯\n        let targetRequiredSec = Math.ceil(certSec * 0.5);\n        let seconds = Math.max(0, targetRequiredSec - studySec);\n        let done = isExplicitDone || (targetRequiredSec > 0 && seconds <= 0);\n\n        if (done) seconds = 0;\n\n        state.courses.push({\n          name, href,\n          certSec, \n          targetRequiredSec,\n          studySec, seconds,\n          done\n        });\n      });\n    });\n\n    if (state.courses.length === 0) {\n      setStatus('❌ 未找到課程。<br>請確認是否位於課程或課表頁面。', '#ea4335');\n      return;\n    }\n\n    state.index = 0;\n    renderList();\n    const pending = state.courses.filter(c => !c.done).length;\n    \n    setStatus(\n      `✅ 找到 <b>${state.courses.length}<\/b> 個課程<br>` +\n      `⏳ 待上：<b style=\"color:#1a73e8\">${pending}<\/b> 堂 ` +\n      `✔ 已完成：<b style=\"color:#34a853\">${state.courses.length - pending}<\/b> 堂`,\n      '#333'\n    );\n    $('__eb_start__').disabled = (pending === 0);\n  }\n\n  function renderList() {\n    $('__eb_list__').innerHTML = state.courses.map((c, i) => {\n      const isActive = (i === state.index && state.running);\n      const bg        = c.done ? '#e6f4ea' : isActive ? '#e8f0fe' : '#fff';\n      const nameColor = c.done ? '#34a853' : isActive ? '#1a73e8' : '#555';\n      const icon      = c.done ? '✅' : isActive ? '▶' : '○';\n      \n      // 顯示的剩餘時間加上 3 分鐘 (180秒) 的補償提示\n      const displaySec = c.done ? 0 : c.seconds + 180;\n      const timeLabel = c.done\n        ? `<span style=\"color:#34a853;font-size:10px;font-weight:bold;\">完成<\/span>`\n        : `<span style=\"color:#888;font-size:11px\">剩餘:${fmtSec(displaySec)}<\/span>`;\n      \n      const subLine   = `<div style=\"font-size:10px;color:#bbb;margin-top:1px;padding-left:16px;\">\n          需修 ${fmtToMinStr(c.targetRequiredSec)} · 已修 ${fmtSec(c.studySec)}\n        <\/div>`;\n      return `\n        <div style=\"padding:6px 10px;border-bottom:1px solid #f0f0f0;background:${bg};\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;\">\n            <span style=\"color:${nameColor};font-size:12px;overflow:hidden;\n              text-overflow:ellipsis;white-space:nowrap;max-width:196px;\">\n              ${icon} ${c.name}\n            <\/span>\n            <span style=\"white-space:nowrap;margin-left:4px;\">${timeLabel}<\/span>\n          <\/div>\n          ${subLine}\n        <\/div>`;\n    }).join('');\n  }\n\n  function resetControls() {\n    state.running = false;\n    state.paused  = false;\n    clearInterval(state.timer);\n    if (state.clickTimer) clearInterval(state.clickTimer);\n    $('__eb_start__').disabled = false;\n    $('__eb_pause__').disabled = true;\n    $('__eb_skip__').disabled  = true;\n    $('__eb_stop__').disabled  = true;\n    $('__eb_pause__').innerText = '⏸ 暫停';\n  }\n\n  function openCourseWindow(c) {\n    if (!c.href || c.href === '#' || c.href.startsWith('javascript')) {\n      alert(`⚠️ 課程「${c.name}」在目前頁面沒有入口連結！請切換至「在學課程」或「我的課表」頁面後，再啟動。`);\n      $('__eb_stop__').click();\n      return;\n    }\n\n    if (state.popup && !state.popup.closed) {\n      try {\n        state.popup.location.href = c.href;\n        state.popup.focus();\n      } catch (e) {\n        state.popup = window.open(c.href, 'elearn_popup', POPUP_OPTS);\n      }\n    } else {\n      state.popup = window.open(c.href, 'elearn_popup', POPUP_OPTS);\n    }\n  }\n\n  /* ════════════════════════════════\n      🌟 自動點擊按鈕（防重複開啟優化版）\n     ════════════════════════════════ */\n  function startAutoClick(c) {\n    if (!state.popup) return;\n    const shortName = c.name.trim().replace(/\\s+/g, '').substring(0, 6);\n    const BLOCK = /退選|推薦|取消|登出|問卷|調查|測驗|回前頁|返回|上一步|回上頁|論壇|討論區/;\n\n    if (state.clickTimer) clearInterval(state.clickTimer);\n\n    state.clickTimer = setInterval(() => {\n      if (!state.running || state.paused) return;\n      const target = state.popup;\n      if (!target || target.closed) return;\n\n      try {\n        const doc = target.document;\n        if (!doc || doc.readyState === 'loading') return;\n\n        // 🎯 終點偵測：若偵測到真正的播放器 iframe 或物件，立刻停止點擊器！\n        if (doc.getElementById('scorm_object') ||\n            doc.getElementById('scorm_layout') ||\n            doc.querySelector('iframe[id*=\"scorm\"]') ||\n            doc.querySelector('iframe[name*=\"scorm\"]') ||\n            (target.location && target.location.href.includes('player.php') && doc.querySelectorAll('iframe').length > 0)) {\n           log('🎯 已進入教材播放器，停止自動點擊。');\n           clearInterval(state.clickTimer);\n           state.clickTimer = null;\n           return;\n        }\n\n        // 標記機制：點下去的同時在該元素做個記號，防重複點擊\n        const doClick = (el) => {\n           el.setAttribute('data-eb-clicked', '1');\n           el.click();\n        };\n\n        // 排除掉已經標記過 [data-eb-clicked] 的元素，防止同網頁沒刷新卻一直點\n        const scormForm = doc.querySelector('form[action*=\"player.php\"]:not([data-eb-clicked]), form[action*=\"launcher.php\"]:not([data-eb-clicked])');\n        if (scormForm) {\n           const btn = scormForm.querySelector('button, input[type=\"submit\"], input[type=\"button\"]');\n           if (btn && !BLOCK.test(btn.value || btn.textContent)) { \n               scormForm.setAttribute('data-eb-clicked', '1');\n               doClick(btn); \n               return; \n           }\n        }\n\n        const playerLink = doc.querySelector('a[href*=\"/mod/scorm/player.php\"]:not([data-eb-clicked])');\n        if (playerLink && !BLOCK.test(playerLink.textContent || '')) { doClick(playerLink); return; }\n\n        const viewLinks = Array.from(doc.querySelectorAll('a[href*=\"/mod/scorm/view.php\"]:not([data-eb-clicked]), a[href*=\"/mod/resource/view.php\"]:not([data-eb-clicked]), a[href*=\"/mod/page/view.php\"]:not([data-eb-clicked])'));\n        if (viewLinks.length > 0) {\n           for (let a of viewLinks) {\n              if (!BLOCK.test(a.textContent || '')) { doClick(a); return; }\n           }\n        }\n\n        const ab = Array.from(doc.querySelectorAll('button:not([data-eb-clicked]), a:not([data-eb-clicked]), input[type=\"button\"]:not([data-eb-clicked]), input[type=\"submit\"]:not([data-eb-clicked])')).find(b => {\n          const t = (b.textContent || b.innerText || b.value || '').replace(/\\s+/g, '');\n          return !BLOCK.test(t) && (t.includes(shortName) || /進入課程|開始上課|開始學習|進入|開始|前往|播放|閱讀|上課/.test(t));\n        });\n        if (ab) { doClick(ab); return; }\n\n      } catch (e) {\n         // 跨網域存取報錯直接忽略\n      }\n    }, 1500); \n  }\n\n  /* ════════════════════════════════\n      執行單一課程\n     ════════════════════════════════ */\n  function runCourse(idx) {\n    if (!state.running) return;\n\n    if (idx >= state.courses.length) {\n      setStatus('🎉 全部課程已完成！', '#34a853');\n      resetControls();\n      return;\n    }\n\n    if (state.courses[idx].done) {\n      runCourse(idx + 1);\n      return;\n    }\n\n    state.index = idx;\n    const c = state.courses[idx];\n\n    let runSec;\n    const useCustom = $('__eb_custom_check__').checked;\n    if (useCustom) {\n      runSec = Math.max(1, (parseInt($('__eb_custom_min__').value, 10) || 30)) * 60;\n    } else {\n      runSec = c.seconds; \n      if (runSec <= 0) { c.done = true; renderList(); runCourse(idx + 1); return; }\n    }\n\n    // 🌟 核心修正：將實際倒數時間（執行時間）預設額外加上 3 分鐘 (180秒)\n    const compensatedRunSec = runSec + 180;\n\n    state.endTime       = Date.now() + compensatedRunSec * 1000;\n    state.totalPausedMs = 0;\n    state.pauseStart    = 0;\n\n    renderList();\n    openCourseWindow(c);\n    startAutoClick(c);\n\n    clearInterval(state.timer);\n    state.timer = setInterval(() => {\n      if (state.paused) return;\n\n      const nowRemMs  = state.endTime + state.totalPausedMs - Date.now();\n      const remaining = Math.max(0, Math.floor(nowRemMs / 1000));\n\n      setStatus(\n        `📖 <b>${c.name.substring(0, 22)}<\/b><br>` +\n        `⏱ 剩餘需修：${fmtSec(remaining)}` +\n        (useCustom ? ' <span style=\"color:#7c4dff;font-size:11px\">自訂(+3分)<\/span>' : ' <span style=\"color:#34a853;font-size:11px\">(已+3分補償)<\/span>') + '<br>' +\n        `📊 進度：${idx + 1} / ${state.courses.length}`\n      );\n\n      if (remaining <= 0) {\n        clearInterval(state.timer);\n        c.done = true;\n        try { if (state.popup && !state.popup.closed) state.popup.close(); } catch (e) {}\n        renderList();\n        setTimeout(() => runCourse(idx + 1), 2500);\n      }\n    }, 500);\n  }\n\n  /* ════════════════════════════════\n      按鈕事件\n     ════════════════════════════════ */\n  $('__eb_scan__').onclick = () => {\n    clearInterval(state.timer);\n    state.running = false;\n    scanCourses();\n  };\n\n  $('__eb_start__').onclick = () => {\n    if (!state.courses.length) return;\n    const nextIdx = state.courses.findIndex(c => !c.done);\n    if (nextIdx < 0) { setStatus('所有課程已完成！', '#34a853'); return; }\n    state.running = true;\n    state.paused  = false;\n    $('__eb_start__').disabled = true;\n    $('__eb_pause__').disabled = false;\n    $('__eb_skip__').disabled  = false;\n    $('__eb_stop__').disabled  = false;\n    runCourse(nextIdx);\n  };\n\n  $('__eb_pause__').onclick = () => {\n    state.paused = !state.paused;\n    if (state.paused) {\n      state.pauseStart = Date.now();\n      $('__eb_pause__').innerText = '▶ 繼續';\n    } else {\n      state.totalPausedMs += Date.now() - state.pauseStart;\n      state.pauseStart = 0;\n      $('__eb_pause__').innerText = '⏸ 暫停';\n    }\n  };\n\n  $('__eb_skip__').onclick = () => {\n    if (!state.running) return;\n    clearInterval(state.timer);\n    if (state.clickTimer) clearInterval(state.clickTimer);\n    try { if (state.popup && !state.popup.closed) state.popup.close(); } catch (e) {}\n    const name = state.courses[state.index]?.name || '';\n    setStatus(`⏭ 已跳過「${name.substring(0, 18)}」<br>⏳ 準備下一堂…`, '#7c4dff');\n    setTimeout(() => runCourse(state.index + 1), 1500);\n  };\n\n  $('__eb_stop__').onclick = () => {\n    resetControls();\n    try { if (state.popup && !state.popup.closed) state.popup.close(); } catch (e) {}\n    setStatus('⏹ 已手動停止', '#ea4335');\n  };\n\n  $('__eb_close__').onclick = () => { $('__eb_stop__').onclick(); panel.remove(); };\n\n  $('__eb_custom_check__').onchange = function () {\n    $('__eb_custom_row__').style.display = this.checked ? 'flex' : 'none';\n  };\n\n  setStatus('👋 歡迎！請確認已登入台北E大並進入課表頁面，<br>再點「🔍 掃描課程」。');\n})();"
  },
  {
    "id": "hrd-course-enroll",
    "title": "E等公務員 課程批次報名",
    "desc": "面板輸入關鍵字清單與時數範圍，自動批次搜尋課程並勾選報名，支援 log 顯示進度。",
    "code": "(() => {\n  if (document.getElementById('hrd-auto-panel')) {\n    document.getElementById('hrd-auto-panel').remove();\n  }\n\n  const panel = document.createElement('div');\n  panel.id = 'hrd-auto-panel';\n  panel.style.cssText = `\n    position: fixed; top: 20px; right: 20px; width: 380px; max-height: 90vh;\n    overflow-y: auto; background: #fff; border: 2px solid #128DB0; border-radius: 8px;\n    box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 999999; font-size: 13px;\n    font-family: \"Microsoft JhengHei\", sans-serif; padding: 12px;\n  `;\n  panel.innerHTML = `\n    <div style=\"font-weight:bold; font-size:15px; margin-bottom:8px; color:#128DB0;\">\n      課程批次報名助手\n    <\/div>\n    <div style=\"margin-bottom:6px;\">關鍵字清單（每行一個，格式：關鍵字,堂數）<\/div>\n    <textarea id=\"hrd-keywords\" rows=\"5\" style=\"width:100%; box-sizing:border-box; font-size:12px;\"\n      placeholder=\"例如：\n人權,2\n溝通技巧,1\nExcel,3\"><\/textarea>\n    <div style=\"margin:8px 0; display:flex; gap:6px; align-items:center;\">\n      認證時數：\n      <input id=\"hrd-hmin\" type=\"number\" step=\"0.5\" value=\"1\" style=\"width:50px;\">\n      ~\n      <input id=\"hrd-hmax\" type=\"number\" step=\"0.5\" value=\"3\" style=\"width:50px;\">\n      小時\n    <\/div>\n    <button id=\"hrd-search-btn\" style=\"width:100%; padding:6px; background:#128DB0; color:#fff; border:none; border-radius:4px; cursor:pointer; margin-bottom:8px;\">\n      1️⃣ 開始批次搜尋\n    <\/button>\n    <div id=\"hrd-results\"><\/div>\n    <button id=\"hrd-enroll-btn\" style=\"width:100%; padding:6px; background:#ee7058; color:#fff; border:none; border-radius:4px; cursor:pointer; margin-top:8px; display:none;\">\n      2️⃣ 開始報名已勾選課程\n    <\/button>\n    <div id=\"hrd-log\" style=\"margin-top:8px; font-size:11px; color:#666; max-height:150px; overflow-y:auto;\"><\/div>\n    <button id=\"hrd-close-btn\" style=\"width:100%; padding:4px; margin-top:8px; background:#999; color:#fff; border:none; border-radius:4px; cursor:pointer;\">關閉面板<\/button>\n  `;\n  document.body.appendChild(panel);\n\n  const log = (msg) => {\n    const logDiv = document.getElementById('hrd-log');\n    const line = document.createElement('div');\n    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;\n    logDiv.appendChild(line);\n    logDiv.scrollTop = logDiv.scrollHeight;\n    console.log('[HRD]', msg);\n  };\n\n  const sleep = (ms) => new Promise(r => setTimeout(r, ms));\n\n  const setInputValue = (el, value) => {\n    const nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;\n    nativeSetter.call(el, value);\n    el.dispatchEvent(new Event('input', { bubbles: true }));\n    el.dispatchEvent(new Event('change', { bubbles: true }));\n  };\n\n  // 確保「對象不限」勾選框是勾選狀態\n  const ensureNoLimitChecked = () => {\n    const cb = document.querySelector('input[name=\"student_target_no_limit\"][value=\"Y\"]');\n    if (cb && !cb.checked) {\n      cb.checked = true;\n      cb.dispatchEvent(new Event('change', { bubbles: true }));\n      cb.dispatchEvent(new Event('click', { bubbles: true }));\n    }\n    return !!cb;\n  };\n\n  const parseCourses = () => {\n    const container = document.getElementById('listtype_list_content');\n    if (!container) return [];\n    const rows = container.querySelectorAll('.tb-row:not(.header)');\n    const courses = [];\n    rows.forEach(row => {\n      const infoLink = row.querySelector('a[href^=\"/info/\"]');\n      if (!infoLink) return;\n      const match = infoLink.getAttribute('href').match(/\\/info\\/(\\d+)/);\n      if (!match) return;\n      const courseId = match[1];\n\n      const nameEl = row.querySelector('h3');\n      const name = nameEl ? nameEl.textContent.trim() : `課程 ${courseId}`;\n\n      let hours = null;\n      let status = '';\n      const infoDivs = row.querySelectorAll('.info div');\n      infoDivs.forEach(d => {\n        const t = d.textContent;\n        if (t.includes('認證時數')) {\n          const hMatch = t.match(/([\\d.]+)\\s*小時/);\n          if (hMatch) hours = parseFloat(hMatch[1]);\n        }\n        if (t.includes('選課狀態')) {\n          const sSpan = d.querySelector('span');\n          status = sSpan ? sSpan.textContent.trim() : '';\n        }\n      });\n\n      if (status !== '未報名') return;\n\n      courses.push({ courseId, name, hours, status });\n    });\n    return courses;\n  };\n\n  const waitForCoursesStable = async (oldHtml, maxWait = 12000) => {\n    await sleep(800);\n    const start = Date.now();\n    let domChanged = false;\n    let lastCount = -1;\n    let stableChecks = 0;\n\n    while (Date.now() - start < maxWait) {\n      const container = document.getElementById('listtype_list_content');\n      const currentHtml = container ? container.innerHTML : '';\n\n      if (!domChanged && currentHtml !== oldHtml) domChanged = true;\n\n      if (domChanged || (Date.now() - start > 3500)) {\n        const totalRows = container ? container.querySelectorAll('.tb-row:not(.header)').length : 0;\n        if (totalRows === lastCount) {\n          stableChecks++;\n          if (stableChecks >= 3 && (totalRows > 0 || (Date.now() - start > 5500))) {\n            return parseCourses();\n          }\n        } else {\n          lastCount = totalRows;\n          stableChecks = 0;\n        }\n      }\n      await sleep(500);\n    }\n    return parseCourses();\n  };\n\n  let collected = [];\n\n  document.getElementById('hrd-search-btn').addEventListener('click', async () => {\n    const raw = document.getElementById('hrd-keywords').value.trim();\n    if (!raw) { alert('請輸入至少一個關鍵字'); return; }\n\n    const hmin = document.getElementById('hrd-hmin').value;\n    const hmax = document.getElementById('hrd-hmax').value;\n\n    const lines = raw.split('\\n').map(l => l.trim()).filter(Boolean);\n    const tasks = lines.map(l => {\n      const [kw, cnt] = l.split(',').map(s => s.trim());\n      return { keyword: kw, count: parseInt(cnt, 10) || 1 };\n    });\n\n    collected = [];\n    document.getElementById('hrd-search-btn').disabled = true;\n    document.getElementById('hrd-search-btn').textContent = '搜尋中...';\n\n    const keywordInput = document.querySelector('input[name=\"keyword\"]');\n    const hminInput = document.querySelector('input[name=\"certification_hours_minimum\"]');\n    const hmaxInput = document.querySelector('input[name=\"certification_hours_maximum\"]');\n    const searchBtn = document.getElementById('btn-search');\n\n    const hasNoLimitCheckbox = ensureNoLimitChecked();\n    if (!hasNoLimitCheckbox) {\n      log('⚠️ 找不到「對象不限」勾選框，略過此設定');\n    } else {\n      log('已勾選「對象不限」');\n    }\n\n    for (const task of tasks) {\n      log(`搜尋關鍵字「${task.keyword}」...`);\n      setInputValue(keywordInput, task.keyword);\n      if (hminInput) setInputValue(hminInput, hmin);\n      if (hmaxInput) setInputValue(hmaxInput, hmax);\n      ensureNoLimitChecked(); // 每次搜尋前再確認一次，避免頁面重繪後被重置\n\n      const container = document.getElementById('listtype_list_content');\n      const oldHtml = container ? container.innerHTML : '';\n\n      searchBtn.click();\n\n      const courses = await waitForCoursesStable(oldHtml);\n      log(`「${task.keyword}」找到 ${courses.length} 筆可報名（未報名）課程`);\n\n      const picked = courses.slice(0, task.count);\n      picked.forEach(c => collected.push({ keyword: task.keyword, ...c }));\n\n      await sleep(800);\n    }\n\n    document.getElementById('hrd-search-btn').disabled = false;\n    document.getElementById('hrd-search-btn').textContent = '1️⃣ 開始批次搜尋';\n\n    renderResults();\n  });\n\n  function renderResults() {\n    const resultsDiv = document.getElementById('hrd-results');\n    if (collected.length === 0) {\n      resultsDiv.innerHTML = '<div style=\"color:#999; margin-top: 8px;\">沒有找到符合條件的可報名課程，請確認 log 資訊。<\/div>';\n      document.getElementById('hrd-enroll-btn').style.display = 'none';\n      return;\n    }\n\n    let html = '';\n    let currentKeyword = null;\n    collected.forEach((c, idx) => {\n      if (c.keyword !=   {
    "id": "hrd-quiz-helper",
    "title": "E等公務員 答題幫手",
    "desc": "擷取測驗題目並協助整理答案格式，方便複製與回填。",
    "code": "(function () {\r\n    'use strict';\r\n\r\n    // ============================\r\n    // E等公務員 AI 題目擷取工具 v1.0\r\n    // ============================\r\n\r\n    const rows = document.querySelectorAll(\"tr.bg03, tr.bg04\");\r\n\r\n    if (!rows.length) {\r\n        console.error(\"【錯誤】找不到任何題目！\");\r\n        return;\r\n    }\r\n\r\n    let output = `請回答所有題目。\r\n\r\n請只輸出 Javascript。\r\n\r\n格式如下\r\n\r\ngo({\r\n\"QID\":[答案],\r\n\"QID\":[答案]\r\n})\r\n\r\n例如\r\n\r\ngo({\r\n\"WM_ITEM1_xxx\":[2],\r\n\"WM_ITEM1_xxx\":[1],\r\n\"WM_ITEM1_xxx\":[0]\r\n})\r\n\r\n規則：\r\n\r\n單選\r\n第一個選項 = 0\r\n第二個選項 = 1\r\n第三個選項 = 2\r\n第四個選項 = 3\r\n\r\n是非\r\n第一個(是/T)=0\r\n第二個(否/F)=1\r\n\r\n複選\r\n例如第一、第三\r\n\r\n[0,2]\r\n\r\n不要解釋\r\n不要 Markdown\r\n不要 \\`\\`\\`\r\n\r\n==============================\r\n\r\n`;\r\n\r\n    rows.forEach((row, idx) => {\r\n\r\n        const tds = row.querySelectorAll(\"td\");\r\n\r\n        if (tds.length < 3) return;\r\n\r\n        const type = tds[0].innerText.split(\"\\n\")[0].trim();\r\n\r\n        const questionTd = tds[2];\r\n\r\n        const ol = questionTd.querySelector(\"ol\");\r\n\r\n        if (!ol) return;\r\n\r\n        // ---------- 題目 ----------\r\n        let q = questionTd.cloneNode(true);\r\n        q.querySelector(\"ol\")?.remove();\r\n\r\n        let qText = q.innerText\r\n            .replace(/^\\d+\\./, \"\")\r\n            .replace(/\\s+/g, \" \")\r\n            .trim();\r\n\r\n        // ---------- QID ----------\r\n        const firstInput = ol.querySelector(\"input\");\r\n\r\n        if (!firstInput) return;\r\n\r\n        const name = firstInput.name;\r\n\r\n        const match = name.match(/ans\\[(.*?)\\]/);\r\n\r\n        if (!match) return;\r\n\r\n        const qid = match[1];\r\n\r\n        output += `QID:${qid}\\n`;\r\n        output += `TYPE:${type}\\n`;\r\n        output += `Q:${qText}\\n`;\r\n        output += `ANS:\\n`;\r\n\r\n        // ---------- 選項 ----------\r\n        const lis = ol.querySelectorAll(\"li\");\r\n\r\n        lis.forEach((li, i) => {\r\n\r\n            let text = li.innerText.trim();\r\n\r\n            if (!text) {\r\n\r\n                const input = li.querySelector(\"input\");\r\n\r\n                if (input) {\r\n\r\n                    if (input.value === \"T\")\r\n                        text = \"是\";\r\n                    else if (input.value === \"F\")\r\n                        text = \"否\";\r\n\r\n                }\r\n\r\n            }\r\n\r\n            output += `${i}.${text}\\n`;\r\n\r\n        });\r\n\r\n        output += \"\\n\";\r\n\r\n    });\r\n\r\n    // ============================\r\n    // 複製剪貼簿\r\n    // ============================\r\n\r\n    const ta = document.createElement(\"textarea\");\r\n    ta.value = output.trim();\r\n    document.body.appendChild(ta);\r\n    ta.select();\r\n\r\n    try {\r\n\r\n        document.execCommand(\"copy\");\r\n\r\n        console.log(\"%c【成功】題目+AI提示詞已複製到剪貼簿！\", \"color:green;font-size:15px;font-weight:bold;\");\r\n\r\n    } catch (e) {\r\n\r\n        console.log(output);\r\n\r\n    }\r\n\r\n    document.body.removeChild(ta);\r\n\r\n    // ============================\r\n    // AI 回填\r\n    // ============================\r\n\r\n    window.go = function (answers) {\r\n\r\n        Object.entries(answers).forEach(([qid, arr]) => {\r\n\r\n            const inputs = document.querySelectorAll(\r\n                `input[name^=\"ans[${qid}]\"]`\r\n            );\r\n\r\n            arr.forEach(i => {\r\n\r\n                if (inputs[i]) {\r\n\r\n                    inputs[i].checked = true;\r\n                    inputs[i].click();\r\n\r\n                }\r\n\r\n            });\r\n\r\n        });\r\n\r\n        console.log(\"%c【成功】已完成填答，0.4 秒後自動交卷。\", \"color:blue;font-weight:bold;\");\r\n\r\n        setTimeout(() => {\r\n\r\n            const btn = document.querySelector(\r\n                'input[type=\"submit\"][value*=\"送出\"]'\r\n            );\r\n\r\n            if (btn) {\r\n\r\n                btn.click();\r\n\r\n            }\r\n\r\n        }, 400);\r\n\r\n    };\r\n\r\n    console.log(\"%c==============================\", \"color:#0aa\");\r\n    console.log(\"%cE等公務員 AI 工具 v1.0 已載入\", \"color:#0aa;font-weight:bold;\");\r\n    console.log(\"%c題目已複製到剪貼簿\", \"color:#0aa\");\r\n    console.log(\"%c等待 AI 回傳 go({...})\", \"color:#0aa\");\r\n    console.log(\"%c==============================\", \"color:#0aa\");\r\n\r\n})();"

/* ========================= 渲染與解鎖邏輯 ========================= */
const DECRYPTED=new Map();
function codeForConsole(c){return c.startsWith('javascript:')?c.slice(11):c} function bookmarkletHref(c){return 'javascript:'+encodeURIComponent(codeForConsole(c))}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(showToast._timer);showToast._timer=setTimeout(()=>t.classList.remove('show'),2600)} function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function bytesFromB64(v){return Uint8Array.from(atob(v),c=>c.charCodeAt(0))} async function decryptSnippet(s,p){const e=new TextEncoder(),base=await crypto.subtle.importKey('raw',e.encode(p),'PBKDF2',false,['deriveKey']),key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:bytesFromB64(s.encrypted.salt),iterations:250000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']),plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:bytesFromB64(s.encrypted.iv)},key,bytesFromB64(s.encrypted.data));return new TextDecoder().decode(plain)} function getCode(s){return s.locked?DECRYPTED.get(s.id):s.code}
function renderList(){const term=document.getElementById('search').value.toLowerCase(),filtered=SNIPPETS.filter(s=>(s.title+s.desc).toLowerCase().includes(term));document.getElementById('countBadge').textContent=`${filtered.length} 個片段`;document.getElementById('emptyState').style.display=filtered.length?'none':'block';document.getElementById('list').innerHTML=filtered.map(s=>{const code=getCode(s),locked=s.locked&&!code;return `<div class="row"><div class="dots"><i></i><i></i><i></i></div><div class="row-main"><p class="row-title">${escapeHtml(s.title)}</p><p class="row-desc">${escapeHtml(s.desc)}</p>${locked?'<div class="lock-note">🔒 內容已加密保護</div>':''}</div><div class="actions">${locked?'<button class="btn unlock" data-unlock>🔒 解鎖</button>':`<button class="btn copy" data-id="${s.id}">📋 複製</button><a class="btn bm" href="${bookmarkletHref(code)}" draggable="true">🔖 書籤</a>`}</div></div>`}).join('');bindActions()}
function bindActions(){document.querySelectorAll('.btn.copy').forEach(b=>b.onclick=()=>{const s=SNIPPETS.find(x=>x.id===b.dataset.id);navigator.clipboard.writeText(codeForConsole(getCode(s))).then(()=>{b.textContent='已複製 ✓';showToast('已複製到剪貼簿，貼到 Console 執行即可');setTimeout(()=>b.textContent='📋 複製',1500)})});document.querySelectorAll('.btn.bm').forEach(b=>b.onclick=e=>{e.preventDefault();showToast('請用滑鼠「拖曳」這顆按鈕到書籤列，而不是點擊')});document.querySelectorAll('[data-unlock]').forEach(b=>b.onclick=openUnlock)}
function openUnlock(){document.getElementById('unlockModal').classList.add('show');document.getElementById('unlockError').textContent='';const i=document.getElementById('unlockPassword');i.value='';setTimeout(()=>i.focus(),50)} function closeUnlock(){document.getElementById('unlockModal').classList.remove('show')}
async function unlockAll(){const p=document.getElementById('unlockPassword').value,e=document.getElementById('unlockError'),b=document.getElementById('unlockSubmit');if(!p){e.textContent='請輸入密碼';return}b.disabled=true;b.textContent='驗證中…';e.textContent='';try{const locked=SNIPPETS.filter(s=>s.locked),values=await Promise.all(locked.map(s=>decryptSnippet(s,p)));locked.forEach((s,i)=>DECRYPTED.set(s.id,values[i]));closeUnlock();renderList();showToast('所有鎖定程式碼已解鎖')}catch{e.textContent='密碼錯誤，請重新輸入'}finally{b.disabled=false;b.textContent='解鎖'}}
document.getElementById('unlockCancel').onclick=closeUnlock;document.getElementById('unlockSubmit').onclick=unlockAll;document.getElementById('unlockPassword').onkeydown=e=>{if(e.key==='Enter')unlockAll()};document.getElementById('unlockModal').onclick=e=>{if(e.target.id==='unlockModal')closeUnlock()};document.getElementById('search').addEventListener('input',renderList);renderList();
</script>
</body>
</html>
