<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>酷莫工具站</title>

  <style>
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 36px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border: 1px solid #e5e7eb;
    }

    .card h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .card p {
      color: #6b7280;
      line-height: 1.7;
    }

    .tag {
      display: inline-block;
      background: #e0f2fe;
      color: #0369a1;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    a.button {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    a.button.secondary {
      background: #374151;
    }

    footer {
      text-align: center;
      color: #9ca3af;
      margin-top: 40px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>酷莫工具站</h1>
      <div class="subtitle">GitHub 專案下載與程式碼書籤整理</div>
    </header>

    <main class="grid">
      <section class="card">
        <span class="tag">專案下載</span>
        <h2>Photo Sorter</h2>
        <p>
          照片快速分類工具，可用數字鍵快速將圖片分到指定資料夾。
        </p>

        <div class="buttons">
          <a class="button" href="https://github.com/yaotong110329/photo-sorter/releases" target="_blank">
            下載
          </a>
          <a class="button secondary" href="https://github.com/yaotong110329/photo-sorter" target="_blank">
            GitHub
          </a>
        </div>
      </section>

      <section class="card">
        <span class="tag">專案下載</span>
        <h2>E-Learning Course Assistant</h2>
        <p>
          課程清單整理、課程搜尋與學習流程輔助工具。
        </p>

        <div class="buttons">
          <a class="button" href="https://github.com/yaotong110329/e-learning-course-assistant/releases" target="_blank">
            下載
          </a>
          <a class="button secondary" href="https://github.com/yaotong110329/e-learning-course-assistant" target="_blank">
            GitHub
          </a>
        </div>
      </section>

      <section class="card">
        <span class="tag">程式碼書籤</span>
        <h2>Console 程式碼書籤</h2>
        <p>
          放常用的 Console 程式碼、瀏覽器書籤碼與快速複製工具。
        </p>

        <div class="buttons">
          <a class="button" href="console.html">
            進入程式碼書籤
          </a>
        </div>
      </section>
    </main>

    <footer>
      © 酷莫工具站
    </footer>
  </div>
</body>
</html>
